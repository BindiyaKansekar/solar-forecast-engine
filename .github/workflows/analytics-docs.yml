name: Analytics PR Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**/*.py"
      - "**/*.py"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to document"
        required: true
        type: number
      scope:
        description: "Documentation scope"
        required: true
        type: choice
        options:
          - "PR changes only"
          - "Full repository"
        default: "PR changes only"

jobs:
  generate-docs:
    name: Generate PR Documentation
    runs-on: ubuntu-latest
    environment: CLAUDE_CREDENTIALS
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Set up engine + Claude auth
        uses: BindiyaKansekar/intelligent-doc-engine/.github/actions/setup-doc-engine@master
        with:
          engine_repo: BindiyaKansekar/intelligent-doc-engine
          engine_ref: master
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_credentials: ${{ secrets.CLAUDE_CREDENTIALS }}

      - name: Checkout repository (full repo scan only)
        if: github.event.inputs.scope == 'Full repository'
        uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate analytics documentation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          SCOPE="${{ github.event.inputs.scope }}"

          if [ "$SCOPE" = "Full repository" ]; then
            analytics-doc scan-dir \
              --path . \
              --output "pr-${PR}-docs.md" \
              --also-html "pr-${PR}-docs.html" \
              --also-docx "pr-${PR}-docs.docx" \
              --title "Full Repository — Solar Forecast Engine"
          else
            analytics-doc scan-pr \
              --provider github \
              --repo "${{ github.repository }}" \
              --pr "${PR}" \
              --output "pr-${PR}-docs.md" \
              --also-html "pr-${PR}-docs.html" \
              --also-docx "pr-${PR}-docs.docx"
          fi

      - name: Upload docs artifact
        id: upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-pr-docs-${{ steps.pr.outputs.number }}
          path: "pr-*-docs.*"
          retention-days: 30

      - name: Post link as PR comment
        if: steps.upload.outputs.artifact-url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          SCOPE: ${{ github.event.inputs.scope }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          SCOPE_LABEL="${SCOPE:-PR changes only}"
          gh pr comment "$PR" \
            --repo "${{ github.repository }}" \
            --body "> 📊 **[Download Documentation](${ARTIFACT_URL})** — ${SCOPE_LABEL} (.md · .html · .docx)"
