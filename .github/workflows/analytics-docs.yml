name: Analytics PR Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**/*.py"
      - "**/*.py"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to document"
        required: true
        type: string
      scope:
        description: "Documentation scope"
        required: true
        type: choice
        options:
          - "PR changes only"
          - "Full repository"
        default: "PR changes only"

jobs:
  generate-docs:
    name: Generate PR Documentation
    runs-on: ubuntu-latest
    environment: CLAUDE_CREDENTIALS
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Set up engine + Claude auth
        uses: BindiyaKansekar/intelligent-doc-engine/.github/actions/setup-doc-engine@master
        with:
          engine_repo: BindiyaKansekar/intelligent-doc-engine
          engine_ref: master
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_credentials: ${{ secrets.CLAUDE_CREDENTIALS }}

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository (full repo scan)
        if: github.event.inputs.scope == 'Full repository'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate analytics documentation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          SCOPE="${{ github.event.inputs.scope }}"

          if [ "$SCOPE" = "Full repository" ]; then
            analytics-doc scan-dir \
              --path "$GITHUB_WORKSPACE" \
              --output "pr-${PR}-docs.md" \
              --also-html "pr-${PR}-docs.html" \
              --also-docx "pr-${PR}-docs.docx" \
              --title "Full Repository — Solar Forecast Engine (PR #${PR})"
          else
            analytics-doc scan-pr \
              --provider github \
              --repo "${{ github.repository }}" \
              --pr "${PR}" \
              --output "pr-${PR}-docs.md" \
              --also-html "pr-${PR}-docs.html" \
              --also-docx "pr-${PR}-docs.docx"
          fi

      - name: Upload docs artifact
        id: upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-pr-docs-${{ steps.pr.outputs.number }}
          path: "pr-*-docs.*"
          retention-days: 30

      - name: Publish to GitHub Pages
        id: pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if ! git clone --branch gh-pages --depth 1 \
              "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
              _gh_pages 2>/dev/null; then
            mkdir _gh_pages && cd _gh_pages
            git init
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
            git checkout --orphan gh-pages
            echo "<html><body><h1>Analytics Documentation</h1></body></html>" > index.html
            git add index.html
            git commit -m "init: create gh-pages branch [skip ci]"
            git push origin gh-pages
            cd ..
          fi

          cp "pr-${PR}-docs.html" "_gh_pages/pr-${PR}-docs.html"
          cp "pr-${PR}-docs.docx" "_gh_pages/pr-${PR}-docs.docx"
          cd _gh_pages
          git add -f "pr-${PR}-docs.html" "pr-${PR}-docs.docx"
          git commit -m "docs: PR #${PR} analytics report [skip ci]" || echo "No changes"
          git push origin gh-pages

          BASE_URL="https://${OWNER}.github.io/${REPO_NAME}"
          echo "html_url=${BASE_URL}/pr-${PR}-docs.html" >> $GITHUB_OUTPUT
          echo "docx_url=${BASE_URL}/pr-${PR}-docs.docx" >> $GITHUB_OUTPUT

      - name: Post link as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HTML_URL: ${{ steps.pages.outputs.html_url }}
          DOCX_URL: ${{ steps.pages.outputs.docx_url }}
          SCOPE: ${{ github.event.inputs.scope }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          SCOPE_LABEL="${SCOPE:-PR changes only}"
          gh pr comment "${PR}" \
            --repo "${{ github.repository }}" \
            --body "> 📊 **[View Interactive Lineage Report](${HTML_URL})** — ${SCOPE_LABEL} · Opens directly in browser
> 📄 **[Download Word Document](${DOCX_URL})** — Full documentation as .docx"
