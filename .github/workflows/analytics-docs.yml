name: Analytics PR Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**/*.py"
      - "**/*.py"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to document"
        required: true
        type: number

jobs:
  generate-docs:
    name: Generate PR Documentation
    runs-on: ubuntu-latest
    environment: CLAUDE_CREDENTIALS
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Set up engine + Claude auth
        uses: BindiyaKansekar/intelligent-doc-engine/.github/actions/setup-doc-engine@master
        with:
          engine_repo: BindiyaKansekar/intelligent-doc-engine
          engine_ref: master
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_credentials: ${{ secrets.CLAUDE_CREDENTIALS }}

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate analytics documentation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          analytics-doc scan-pr \
            --provider github \
            --repo "${{ github.repository }}" \
            --pr "${{ steps.pr.outputs.number }}" \
            --output "pr-${{ steps.pr.outputs.number }}-docs.md" \
            --also-html "pr-${{ steps.pr.outputs.number }}-docs.html"

      - name: Upload docs artifact
        id: upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-pr-docs-${{ steps.pr.outputs.number }}
          path: "pr-*-docs.*"
          retention-days: 30

      - name: Append artifact link to docs
        if: steps.upload.outputs.artifact-url != ''
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          echo "" >> "pr-${PR}-docs.md"
          echo "---" >> "pr-${PR}-docs.md"
          echo "> 📊 **[View Interactive Lineage Report](${ARTIFACT_URL})** — Download the HTML report with interactive data lineage diagram" >> "pr-${PR}-docs.md"

      - name: Post documentation as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          [ -f "pr-${PR}-docs.md" ] && gh pr comment "$PR" \
            --repo "${{ github.repository }}" \
            --body-file "pr-${PR}-docs.md"
